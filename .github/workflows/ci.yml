name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check for pyproject.toml version bump
      if: github.event_name == 'pull_request'
      run: |
        git fetch origin ${{ github.base_ref }}
        if ! git diff origin/${{ github.base_ref }} HEAD -- pyproject.toml | grep -q '^+version = '; then
          echo "::error::pyproject.toml version must be bumped before merging!"
          exit 1
        fi

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ".[dev]"

    - name: Run pre-commit
      run: |
        pre-commit run --all-files

    - name: Run reqtrace coverage
      run: |
        python -m reqtrace.cli --reqs reqs/*.yml --src src/
      continue-on-error: true

    - name: Run tests
      run: |
        pytest
